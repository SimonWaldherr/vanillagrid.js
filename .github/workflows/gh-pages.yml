name: Build and publish Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build dist assets
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: vanillagrid-dist
          path: dist
          if-no-files-found: error

      - name: Prepare Pages bundle
        run: |
          set -euo pipefail
          rm -rf site
          mkdir -p site/dist
          cp -R dist/. site/dist/
          cp -R demo site/demo
          
          mkdir -p site/demo/dist
          cp -R dist/. site/demo/dist/
          find site/demo -name "*.html" -exec sed -i 's|"\.\./dist/|"./dist/|g' {} +
          
          cp demo.html site/demo.html
          cp demo.html site/index.html
          cp demo_mini.html site/demo_mini.html
          cp sample.md site/sample.md
          touch site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: pages-site
          path: site
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Download Pages artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: pages-site
          path: ${{ runner.temp }}/pages-site

      - name: Publish to gh-pages branch
        env:
          PAGES_BRANCH: gh-pages
          SITE_DIR: ${{ runner.temp }}/pages-site
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin "${PAGES_BRANCH}" >/dev/null 2>&1; then
            git fetch origin "${PAGES_BRANCH}:refs/remotes/origin/${PAGES_BRANCH}"
            git switch --force-create "${PAGES_BRANCH}" "origin/${PAGES_BRANCH}"
          else
            git switch --orphan "${PAGES_BRANCH}"
          fi

          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R "${SITE_DIR}"/. .
          touch .nojekyll

          git add --all

          if git diff --cached --quiet; then
            echo "No Pages changes to publish."
            exit 0
          fi

          git commit -m "Deploy GitHub Pages"
          git push origin "${PAGES_BRANCH}"
